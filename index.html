            const زخرفة = 'ặßçđěřġħíĵķĺṁñőpqřšťůvwxŷźẶßÇĐĚŘĠĦÍĴĶĹṀÑŐPQŘŠŤŮVWXŶŹاأإآبـتـثجـحـخـدذرزسـشـصـضـطـظـعـغـفـقـكـلـمـنـهـويـىةءؤئ';
            return text.split('').map(char => {
                const index = chars.indexOf(char);
                return index !== -1 ? زخرفة[index] : char;
            }).join('');
        },
        decorate(text) {
            if (!text.trim()) return [];
            return [
                { name: 'زخرفة ببجي ♛', value: `♛『${text}』♛` }, { name: 'زخرفة ببجي ╾', value: `╾━╤デ╦︻ ${text} ︻╦デ╤━╼` },
                { name: 'زخرفة فري فاير ꧁', value: `꧁༺${text}༻꧂` }, { name: 'زخرفة فري فاير ☠︎', value: `☠︎︎༒︎${text}༒︎☠︎︎` },
                { name: 'زخرفة احترافية ⚡️', value: `⚡️${text}⚡️` }, { name: 'زخرفة أسطورية ◥', value: `◥${this.arabicStyle4(text)}◤` },
                { name: 'زخرفة نارية 🔥', value: `🔥${text.split('').join(' ')}🔥` }, { name: 'زخرفة قلوب ♡', value: `♡´･ᴗ･\`♡ ${text} ♡´･ᴗ･\`♡` },
                { name: 'زخرفة نجوم ✨', value: `✨✴️ ${text} ✴️✨`}, { name: 'زخرفة عربية 彡1彡', value: `★彡${text}彡★` },
                { name: 'زخرفة عربية ꧁2꧂', value: `꧁${text}꧂` }, { name: 'زخرفة عربية 【3】', value: `【${text}】` },
                { name: 'زخرفة عربية 🎼', value: `..•.¸¸•´¯\`•.¸¸.•.. ${text} ..•.¸¸•´¯\`•.¸¸.•..` }, { name: 'زخرفة عربية متشابكة', value: this.arabicStyle4(text) },
                { name: 'زخرفة عربية ممتدة', value: text.split('').join('ـ') },
                { name: 'زخرفة انجليزي Small Caps', value: this.transform(text, this.smallCapsMap) },
                { name: 'زخرفة انجليزي Monospace', value: this.transform(text, this.monospaceMap) },
                { name: 'زخرفة انجليزي Cursive', value: this.transform(text, this.cursiveMap) },
                { name: 'زخرفة انجليزي Bold Fraktur', value: this.transform(text, this.boldFrakturMap) },
                { name: 'زخرفة انجليزي Double Struck', value: this.transform(text, this.doubleStruckMap) },
                { name: 'زخرفة انجليزي Squared', value: this.transform(text, this.squaredMap) },
                { name: 'زخرفة انجليزي Circled', value: this.transform(text, this.circledMap) },
                { name: 'زخرفة انجليزي Upside Down', value: this.transform(text, this.upsideDownMap) },
            ];
        }
    };

    // --- DOM ELEMENTS ---
    const appContent = document.getElementById('app-content');
    const navLinksContainer = document.getElementById('nav-links');
    const pageTitleMeta = document.getElementById('page-title-meta');
    const pageDescriptionMeta = document.getElementById('page-description-meta');
    const schemaMarkupScript = document.getElementById('schema-markup');

    // --- RENDER FUNCTIONS ---
    function renderNav() {
        navLinksContainer.innerHTML = navLinks.map(link => {
             const href = link.path === '/' ? (basePath || '/') : `${basePath}${link.path}`;
             return `
            <li>
                <a href="${href}" class="px-3 sm:px-4 py-2 rounded-lg text-sm sm:text-base font-semibold text-gray-300 hover:bg-purple-700/50 transition-all duration-300 block">
                    ${link.label}
                </a>
            </li>
        `}).join('');
    }
    
    function debounce(func, delay) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), delay);
        };
    }

    // Function to render Schema Markup
    function renderSchemaMarkup(routeData, appPath) {
        const url = window.location.origin + basePath + appPath;
        let schema = {
            "@context": "https://schema.org",
            "@graph": [
                {
                    "@type": "WebSite",
                    "@id": `${window.location.origin}${basePath || '/'}#website`,
                    "url": `${window.location.origin}${basePath || '/'}`,
                    "name": "زخرفة النصوص والأسماء",
                    "description": "موقع لزخرفة الاسماء والكلمات باحترافية وبالخطوط العربية والإنجليزية أون لاين.",
                    "potentialAction": {
                        "@type": "SearchAction",
                        "target": {
                            "@type": "EntryPoint",
                            "urlTemplate": `${window.location.origin}${basePath || '/'}?q={search_term_string}`
                        },
                        "query-input": "required name=search_term_string"
                    }
                },
                {
                    "@type": "WebPage",
                    "@id": `${url}#webpage`,
                    "url": url,
                    "name": routeData.title,
                    "isPartOf": { "@id": `${window.location.origin}${basePath || '/'}#website` },
                    "description": routeData.data.description,
                    "inLanguage": "ar",
                    "primaryImageOfPage": {
                        "@type": "ImageObject",
                        "url": `${window.location.origin}${basePath || '/'}og-image.jpg`, // Replace with actual OG image URL
                        "width": "1200",
                        "height": "630"
                    },
                    "datePublished": "2023-01-01", // Update if you have dynamic publishing dates
                    "dateModified": new Date().toISOString().split('T')[0] // Current date for modification
                }
            ]
        };

        if (appPath === '/') {
            // Add HowTo schema for the main decoration page
            schema["@graph"].push({
                "@type": "HowTo",
                "name": "كيفية زخرفة اسمك أو نصك",
                "description": "اتبع هذه الخطوات البسيطة لزخرفة النصوص والأسماء على موقعنا.",
                "step": [
                    {
                        "@type": "HowToStep",
                        "text": "أدخل النص في مربع الإدخال",
                        "itemListElement": [
                            { "@type": "HowToDirection", "text": "ابحث عن مربع الإدخال المسمى 'أدخل النص هنا للزخرفة'." }
                        ]
                    },
                    {
                        "@type": "HowToStep",
                        "text": "اختر الزخرفة المفضلة",
                        "itemListElement": [
                            { "@type": "HowToDirection", "text": "بمجرد إدخال النص، ستظهر لك عشرات أشكال الزخرفة تلقائياً." }
                        ]
                    },
                    {
                        "@type": "HowToStep",
                        "text": "اضغط على زر النسخ",
                        "itemListElement": [
                            { "@type": "HowToDirection", "text": "اضغط على زر 'نسخ' بجوار الزخرفة التي تعجبك لنسخها إلى الحافظة." }
                        ]
                    },
                    {
                        "@type": "HowToStep",
                        "text": "استخدم النص المزخرف",
                        "itemListElement": [
                            { "@type": "HowToDirection", "text": "الصق النص المزخرف في ألعابك المفضلة أو على وسائل التواصل الاجتماعي." }
                        ]
                    }
                ]
            });
        }
        
        schemaMarkupScript.textContent = JSON.stringify(schema, null, 2);
    }

    function renderDecorationPage(route) {
        const template = document.getElementById('decoration-page-template').content.cloneNode(true);
        appContent.innerHTML = '';
        appContent.appendChild(template);
        appContent.querySelector('[data-page]').classList.add('active');

        appContent.querySelector('#page-title').textContent = route.data.h1;
        appContent.querySelector('#page-description').textContent = route.data.description;
        
        const textInput = appContent.querySelector('#text-input');
        const resultsContainer = appContent.querySelector('#results-container');
        const welcomeContent = route.data.welcomeContentHtml;
        resultsContainer.innerHTML = welcomeContent;

        const debouncedRender = debounce((text) => {
             if (text.trim().length > 0) {
                const results = DecorationUtil.decorate(text);
                resultsContainer.innerHTML = `
                    <h2 class="text-2xl font-bold text-center mb-6 text-gray-200">نتائج الزخرفة:</h2>
                    <div class="grid grid-cols-1 gap-4">
                        ${results.map(result => `
                            <div class="animate-fade-in-item">
                                <h3 class="text-sm text-purple-300 mb-2 mr-2 font-semibold">${result.name}</h3>
                                <div class="bg-gray-800 rounded-lg p-4 flex flex-col sm:flex-row items-center justify-between gap-4 transition-all duration-300 hover:bg-gray-700/50">
                                    <p class="text-xl text-center sm:text-right flex-grow font-mono bg-gray-900/50 p-3 rounded-md w-full sm:w-auto overflow-x-auto select-all">${result.value}</p>
                                    <button data-copy-value="${result.value}" class="copy-btn w-full sm:w-auto px-6 py-2 rounded-md font-bold transition-all duration-300 ease-in-out text-white flex-shrink-0 bg-purple-600 hover:bg-purple-700" aria-label="نسخ هذا النص المزخرف">
                                        <span>نسخ</span>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                resultsContainer.innerHTML = welcomeContent;
            }
        }, 300);

        textInput.addEventListener('input', (e) => {
            debouncedRender(e.target.value);
        });
    }

    function renderSymbolsPage(route, categories, theme) {
        const isIslamic = theme === 'islamic';
        const templateId = isIslamic ? 'islamic-symbols-page-template' : 'symbols-page-template';
        const containerId = isIslamic ? 'islamic-symbols-container' : 'symbols-container';
        
        const template = document.getElementById(templateId).content.cloneNode(true);
        appContent.innerHTML = '';
        appContent.appendChild(template);
        appContent.querySelector('[data-page]').classList.add('active');


        appContent.querySelector('#page-title').textContent = route.data.h1;
        appContent.querySelector('#page-description').textContent = route.data.description;
        
        const container = appContent.querySelector(`#${containerId}`);
        container.innerHTML = ''; // Clear container for incremental rendering

        let categoryIndex = 0;
        function renderNextCategory() {
            if (categoryIndex >= categories.length) return;
            
            const category = categories[categoryIndex];
            const section = document.createElement('section');
            section.className = 'mb-12 animate-fade-in';
            section.style.opacity = '0'; // Start invisible for fade-in

            section.innerHTML = `
                <h2 class="text-2xl sm:text-3xl font-bold ${isIslamic ? 'text-teal-300 border-teal-500/30' : 'text-purple-300 border-purple-500/30'} mb-6 pb-2 border-b-2">
                    ${category.title}
                </h2>
                <div class="grid ${isIslamic ? 'grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3' : 'grid-cols-5 sm:grid-cols-8 md:grid-cols-10 lg:grid-cols-12 xl:grid-cols-15 gap-2'}">
                    ${category.symbols.map(symbol => `
                        <div tabindex="0" data-copy-value="${symbol}" class="copy-symbol-btn relative flex items-center justify-center ${isIslamic ? 'h-20 text-xl sm:text-2xl p-2' : 'h-16 text-3xl'} bg-gray-800/50 rounded-lg cursor-pointer transition-all duration-200 ease-in-out ${isIslamic ? 'hover:bg-teal-600/50' : 'hover:bg-purple-600/50'} hover:scale-110 hover:shadow-lg focus:outline-none focus:ring-2 ${isIslamic ? 'focus:ring-teal-400' : 'focus:ring-purple-400'}" aria-label="نسخ رمز ${symbol}">
                            <span class="text-center">${symbol}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(section);
            
            // Trigger animation
            requestAnimationFrame(() => {
                section.style.opacity = '1';
            });

            categoryIndex++;
            requestAnimationFrame(renderNextCategory); // Schedule next category rendering
        }
        
        renderNextCategory(); // Start rendering categories
    }

    // --- EVENT HANDLING & ROUTING ---
    function copyText(value, element) {
        if (!navigator.clipboard) {
            // Fallback for older browsers or if clipboard API not available
            const textarea = document.createElement('textarea');
            textarea.value = value;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
            showCopyFeedback(element, "تم النسخ!");
            return;
        }
        navigator.clipboard.writeText(value).then(() => {
            showCopyFeedback(element, "تم النسخ!");
        }).catch(err => console.error('Failed to copy: ', err));
    }

    function showCopyFeedback(element, message) {
        const originalText = element.innerHTML;
        element.innerHTML = `<span>${message}</span>`;
        element.classList.remove('bg-purple-600', 'hover:bg-purple-700');
        element.classList.add('bg-green-600');
        
        setTimeout(() => {
            element.innerHTML = originalText;
            element.classList.remove('bg-green-600');
            element.classList.add('bg-purple-600', 'hover:bg-purple-700');
        }, 2000);
    }

    function copySymbol(value, element) {
        if (!navigator.clipboard) {
            const textarea = document.createElement('textarea');
            textarea.value = value;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            textarea.remove();
            showSymbolCopyFeedback(element, "تم النسخ!");
            return;
        }
        navigator.clipboard.writeText(value).then(() => {
            showSymbolCopyFeedback(element, "تم النسخ!");
        }).catch(err => console.error('Failed to copy: ', err));
    }

    function showSymbolCopyFeedback(element, message) {
        const existingPopup = document.querySelector('.copied-popup');
        if (existingPopup) existingPopup.remove();

        const popup = document.createElement('div');
        popup.className = 'copied-popup absolute -top-8 left-1/2 -translate-x-1/2 bg-green-600 text-white text-xs font-bold px-2 py-1 rounded-md shadow-lg z-10 animate-popup';
        popup.textContent = message;
        element.appendChild(popup);
        
        setTimeout(() => {
            popup.remove();
        }, 1500);
    }
    
    appContent.addEventListener('click', (e) => {
        const copyBtn = e.target.closest('.copy-btn');
        if (copyBtn) {
            copyText(copyBtn.dataset.copyValue, copyBtn);
        }

        const copySymbolBtn = e.target.closest('.copy-symbol-btn');
        if (copySymbolBtn) {
            copySymbol(copySymbolBtn.dataset.copyValue, copySymbolBtn);
        }
    });

    document.body.addEventListener('click', e => {
        const link = e.target.closest('a');
        // Ensure the link is internal to avoid intercepting external links
        if (link && link.origin === window.location.origin) {
            e.preventDefault();
            const href = link.getAttribute('href');
            // Only push state if the URL is different to avoid redundant history entries
            if (window.location.pathname !== href) {
                history.pushState({}, '', href);
                router();
            }
        }
    });

    function router() {
        const appPath = getAppPath();
        const route = routes[appPath] || routes['/']; // Fallback to home page for unknown paths

        // Update meta tags for SEO
        document.title = route.title;
        pageTitleMeta.textContent = route.title; // Update meta title
        pageDescriptionMeta.setAttribute('content', route.data.description); // Update meta description

        // Render Schema Markup
        renderSchemaMarkup(route, appPath);

        switch(route.type) {
            case 'decoration':
                renderDecorationPage(route);
                break;
            case 'symbols':
                renderSymbolsPage(route, symbolCategories, 'default');
                break;
            case 'islamic-symbols':
                renderSymbolsPage(route, islamicSymbolCategories, 'islamic');
                break;
        }
        
        // Update active nav link
        navLinksContainer.querySelectorAll('a').forEach(a => {
            const linkHref = a.getAttribute('href');
            let cleanedLinkPath = linkHref.replace(basePath, '');
            if (!cleanedLinkPath.startsWith('/')) cleanedLinkPath = '/' + cleanedLinkPath;
            if (cleanedLinkPath === '') cleanedLinkPath = '/'; // Handle root path

            if (cleanedLinkPath === appPath) {
                a.classList.add('bg-purple-600', 'text-white', 'shadow-md');
            } else {
                a.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
            }
        });
    }

    // --- INITIALIZATION ---
    document.getElementById('current-year').textContent = new Date().getFullYear();
    renderNav();
    window.addEventListener('popstate', router);
    router(); // Initial load
});
</script>

</body>
